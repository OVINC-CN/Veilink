name: veilink

services:
  app:
    image: ${VEILINK_IMAGE:-ghcr.io/ovinc-cn/veilink:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: "none"
    init: true
    user: "65532:65532"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 384m
    memswap_limit: 384m
    mem_swappiness: 0
    ulimits:
      core:
        soft: 0
        hard: 0
      nofile:
        soft: 4096
        hard: 4096
    stop_grace_period: 10s
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,mode=1700,uid=65532,gid=65532
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      WEB_DIST_DIR: /app/web
      TLS_CERT_FILE: ${TLS_CERT_FILE:-}
      TLS_KEY_FILE: ${TLS_KEY_FILE:-}
      APP_ORIGIN: ${APP_ORIGIN:?Set APP_ORIGIN to the exact public HTTPS origin}
      TRUST_PROXY_CIDRS: ${TRUST_PROXY_CIDRS:?Set explicit reverse-proxy CIDRs}
      REDIS_URL: ${REDIS_URL:?Set the external Redis URL}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-veilink}
      STATE_HMAC_SECRET: ${STATE_HMAC_SECRET:?Generate an independent state HMAC secret}
      STUN_URLS: ${STUN_URLS:?Set one or more STUN URLs; TURN is rejected}
      RECONNECT_GRACE_SECONDS: ${RECONNECT_GRACE_SECONDS:-30}
      ROOM_TTL_SECONDS: ${ROOM_TTL_SECONDS:-86400}
      MAX_CONNECTIONS: ${MAX_CONNECTIONS:-2048}
      MAX_CONNECTIONS_PER_IP: ${MAX_CONNECTIONS_PER_IP:-64}
      MAX_ROOMS_PER_IP: ${MAX_ROOMS_PER_IP:-32}
      ROOM_CREATE_ATTEMPTS_PER_MINUTE: ${ROOM_CREATE_ATTEMPTS_PER_MINUTE:-20}
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${APP_PORT:-3000}:3000/tcp"
    healthcheck:
      test:
        - CMD
        - /app/healthcheck
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - veilink

networks:
  veilink:
    name: veilink-internal
    driver: bridge
    ipam:
      config:
        - subnet: ${VEILINK_SUBNET:-172.30.0.0/24}
          gateway: ${VEILINK_GATEWAY:-172.30.0.1}
